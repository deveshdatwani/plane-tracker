# Plane Tracker Configuration
# ============================

# Detection settings (YOLO model)
detection:
  model_path: "yolov8n-seg.pt"
  confidence_threshold: 0.45
  iou_threshold: 0.4
  verbose: false

# Tracker settings (Kalman filter based)
tracker:
  iou_threshold: 0.2       # Minimum IoU to match detection to track
  max_age: 100              # Frames before deleting lost track
  min_hits: 10             # Minimum hits before track is considered confirmed
  max_keypoints: 20        # Maximum keypoints to track per airplane

# Re-ID settings (reappearance matching)
reid:
  enabled: true
  gallery_max_age: 300     # Keep features in gallery for N frames after track dies
  threshold: 0.7           # Cosine similarity threshold for Re-ID match

# Hangar event detection
hangar:
  cooldown_frames: 30      # Minimum frames between events
  iou_threshold: 0.01      # Overlap threshold with hangar zone
  # Note: hangar side (left/right) is auto-detected based on video name
  flash_on_event: true     # Flash boundary when enter/exit detected
  flash_color: [140, 200, 220]  # BGR - muted/subtle yellow
  flash_rate: 4            # Flash toggle every N frames

# Debug overlay settings
debug:
  level: 1               # 0=off, 1=minimal, 2=full
  show_frame_id: true
  show_detections: true
  show_tracks: true
  show_latency: true
  show_fps: true
  processing_debug: false  # Draw all detections with IDs and trajectory curves (expensive)
  show_ground_truth: true # Overlay GT annotations for debugging/comparison
  metrics_iou_threshold: 0.5  # IOU threshold for precision/recall/HOTA metrics
  eva: false                # If false, sequence is treated as unseen (no GT), metrics show "n/a"

# Anti-wobble frame stabilization
stabilization:
  enabled: true
  num_anchors: 8                  # Number of anchor points to track
  anchor_box_size: 32             # Size of template box around each anchor
  search_margin: 16               # Search area margin around anchor
  min_confidence: 0.7             # Minimum template match confidence
  reinit_threshold: 0.5           # Reinitialize anchors if avg confidence drops below this
  corner_detection:
    quality_level: 0.01           # Corner quality threshold (0-1)
    min_distance: 50              # Minimum distance between corners
    block_size: 7                 # Block size for corner detection
  visualization:
    enabled: true
    draw_anchors: true            # Draw anchor boxes
    draw_translation: true        # Draw translation vector
    draw_original_box: true       # Draw original position box
    anchor_color: [0, 255, 255]   # BGR - yellow
    original_color: [0, 0, 255]   # BGR - red for original position
    corrected_color: [0, 255, 0]  # BGR - green for corrected position
    line_thickness: 2

# Visualization settings
visualization:
  track_color_active: [200, 220, 100]      # BGR
  track_color_lost: [120, 120, 200]        # BGR
  hangar_boundary_color: [60, 60, 60]      # BGR
  gt_color: [255, 0, 255]                  # BGR - magenta for ground truth
  font_scale: 0.45
  font_thickness: 1
